<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽⚽⚽ BOLÃO KEBOLETS ⚽⚽⚽</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1a7a3c; --green-dark: #125a2b; --green-light: #e8f5ed;
    --gold: #f0b429; --gold-dark: #b8871a;
    --white: #ffffff; --gray-50: #f9f9f7; --gray-100: #f0eeea;
    --gray-200: #dddbd5; --gray-400: #9b9891; --gray-700: #3d3c38; --gray-900: #1a1917;
    --radius: 12px; --radius-sm: 8px;
  }
  body { font-family: 'Barlow', sans-serif; background: var(--gray-100); color: var(--gray-900); min-height: 100vh; }
  header { background: var(--green); padding: 1.25rem 1rem 1rem; text-align: center; position: relative; overflow: hidden; }
  header::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(-55deg, transparent, transparent 18px, rgba(255,255,255,0.03) 18px, rgba(255,255,255,0.03) 36px); }
  .header-inner { position: relative; z-index: 1; }
  .header-title { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(22px, 6vw, 40px); font-weight: 800; color: var(--gold); letter-spacing: 0.02em; line-height: 1.1; text-transform: uppercase; }
  .header-sub { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 4px; }
  .points-strip { display: flex; justify-content: center; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
  .pts-pill { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: rgba(255,255,255,0.9); font-weight: 500; }
  .pts-pill strong { color: var(--gold); }
  main { max-width: 560px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
  #name-section { background: var(--white); border-radius: var(--radius); border: 1px solid var(--gray-200); padding: 1.5rem; margin-bottom: 1.5rem; text-align: center; }
  #name-section h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; color: var(--green); text-transform: uppercase; margin-bottom: 6px; }
  #name-section p { font-size: 14px; color: var(--gray-400); margin-bottom: 1rem; }
  .name-row { display: flex; gap: 8px; max-width: 320px; margin: 0 auto; }
  .name-row input { flex: 1; padding: 9px 12px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 15px; font-family: 'Barlow', sans-serif; color: var(--gray-900); background: var(--gray-50); outline: none; transition: border-color 0.15s; }
  .name-row input:focus { border-color: var(--green); }
  .btn-enter { background: var(--green); color: var(--white); border: none; border-radius: var(--radius-sm); padding: 9px 20px; font-size: 14px; font-weight: 600; font-family: 'Barlow', sans-serif; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
  .btn-enter:hover { background: var(--green-dark); }
  #user-bar { display: none; align-items: center; gap: 10px; background: var(--white); border-radius: var(--radius-sm); border: 1px solid var(--gray-200); padding: 8px 14px; margin-bottom: 1.25rem; }
  .user-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--green); color: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; font-family: 'Barlow Condensed', sans-serif; flex-shrink: 0; }
  #user-bar .uname { font-size: 14px; font-weight: 600; flex: 1; color: var(--gray-900); }
  .btn-sair { font-size: 12px; color: var(--gray-400); background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: 6px; font-family: 'Barlow', sans-serif; }
  .btn-sair:hover { background: var(--gray-100); color: var(--gray-700); }
  .day-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-400); margin-bottom: 10px; }
  .match-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--gray-200); padding: 1rem 1.25rem; margin-bottom: 12px; }
  .match-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .match-time { font-size: 12px; color: var(--gray-400); font-weight: 500; }
  .match-group { font-size: 11px; background: var(--green-light); color: var(--green); font-weight: 600; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.04em; }
  .match-body { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; }
  .team { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .team-flag { width: 40px; height: 40px; display: block; }
  .team-flag img { width: 40px; height: 40px; }
  .team-name { font-size: 13px; font-weight: 600; color: var(--gray-700); text-align: center; line-height: 1.2; }
  .score-inputs { display: flex; align-items: center; gap: 6px; }
  .score-input { width: 44px; height: 44px; text-align: center; font-size: 20px; font-weight: 700; font-family: 'Barlow Condensed', sans-serif; border: 2px solid var(--gray-200); border-radius: var(--radius-sm); background: var(--gray-50); color: var(--gray-900); outline: none; transition: border-color 0.15s; -moz-appearance: textfield; }
  .score-input::-webkit-outer-spin-button, .score-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .score-input:focus { border-color: var(--green); background: var(--white); }
  .score-input:disabled { background: var(--gray-100); color: var(--gray-400); cursor: not-allowed; border-color: var(--gray-200); }
  .score-sep { font-size: 18px; font-weight: 700; color: var(--gray-400); font-family: 'Barlow Condensed', sans-serif; }
  .match-footer { display: flex; align-items: center; justify-content: flex-end; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--gray-100); min-height: 28px; }
  .badge-locked { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; background: #fff8e6; color: var(--gold-dark); }
  .btn-save { background: var(--green); color: var(--white); border: none; border-radius: var(--radius-sm); padding: 8px 20px; font-size: 13px; font-weight: 600; font-family: 'Barlow', sans-serif; cursor: pointer; transition: background 0.15s; }
  .btn-save:hover { background: var(--green-dark); }
  .btn-save:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }
  .btn-ranking { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: var(--white); color: var(--green); border: 1.5px solid var(--green); border-radius: var(--radius-sm); padding: 11px 20px; font-size: 14px; font-weight: 600; font-family: 'Barlow', sans-serif; cursor: pointer; transition: all 0.15s; margin-top: 8px; }
  .btn-ranking:hover { background: var(--green-light); }
  .btn-ranking.active { background: var(--green); color: var(--white); }
  .empty-day { text-align: center; padding: 2.5rem 1rem; color: var(--gray-400); font-size: 14px; line-height: 1.7; background: var(--white); border-radius: var(--radius); border: 1px solid var(--gray-200); }
  .empty-day strong { display: block; font-size: 18px; color: var(--gray-700); margin-bottom: 6px; }
  #loading-games { text-align: center; padding: 2rem; color: var(--gray-400); font-size: 14px; }
  #placares-section { margin-top: 4px; }
  .placares-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--gray-200); overflow: hidden; margin-top: 10px; }
  .placar-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--gray-100); }
  .placar-row:last-child { border-bottom: none; }
  .placar-team { font-size: 13px; font-weight: 600; color: var(--gray-700); display: flex; align-items: center; gap: 6px; }
  .placar-team.away { flex-direction: row-reverse; text-align: right; }
  .placar-flag { width: 20px; height: 20px; display: block; flex-shrink: 0; }
  .placar-flag img { width: 20px; height: 20px; }
  .placar-score { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; color: var(--gray-900); text-align: center; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
  .placar-score.pending { color: var(--gray-400); font-size: 14px; font-weight: 500; }
  .placar-time { font-size: 11px; color: var(--gray-400); text-align: center; }
  .ranking-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; margin-top: 1.25rem; }
  .ranking-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: var(--gray-900); text-transform: uppercase; letter-spacing: 0.03em; }
  .ranking-sub { font-size: 12px; color: var(--gray-400); }
  .ranking-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--gray-200); overflow: hidden; }
  .ranking-legend { display: grid; grid-template-columns: 32px 1fr 48px 48px 48px; gap: 8px; padding: 6px 16px 8px; border-bottom: 1px solid var(--gray-200); }
  .ranking-row { display: grid; grid-template-columns: 32px 1fr 48px 48px 48px; align-items: center; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--gray-100); }
  .ranking-row:last-child { border-bottom: none; }
  .ranking-row.me { background: var(--green-light); }
  .ranking-row.top1 { background: #fffbea; }
  .pos { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: var(--gray-400); text-align: center; }
  .rk-name { font-size: 14px; font-weight: 600; color: var(--gray-900); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rk-name.me-label::after { content: ' (você)'; font-weight: 400; color: var(--gray-400); font-size: 12px; }
  .rk-col { text-align: center; font-size: 13px; }
  .rk-col-label { font-size: 10px; color: var(--gray-400); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
  .rk-pts { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: var(--green); }
  .ranking-empty { text-align: center; padding: 2rem; color: var(--gray-400); font-size: 14px; }
  #loading-ranking { text-align: center; padding: 1.5rem; color: var(--gray-400); font-size: 14px; }
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--gray-900); color: var(--white); padding: 10px 22px; border-radius: 24px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 999; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media (max-width: 400px) { .team-flag { width: 32px; height: 32px; } .team-flag img { width: 32px; height: 32px; } .score-input { width: 38px; height: 38px; font-size: 18px; } }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="header-title">⚽⚽⚽ Bolão Kebolets ⚽⚽⚽</div>
    <div class="header-sub" id="date-label">Copa do Mundo FIFA 2026</div>
    <div class="points-strip">
      <span class="pts-pill">🎯 Placar exato = <strong>3 pts</strong></span>
      <span class="pts-pill">✅ Resultado certo = <strong>1 pt</strong></span>
      <span class="pts-pill">❌ Errou = <strong>0 pts</strong></span>
    </div>
  </div>
</header>
<main>
  <div id="name-section">
    <h2>Quem é você?</h2>
    <p>Digite seu nome para registrar seus palpites.</p>
    <div class="name-row">
      <input type="text" id="name-input" placeholder="Seu nome" maxlength="40" />
      <button class="btn-enter" onclick="enterWithName()">Entrar</button>
    </div>
  </div>
  <div id="user-bar">
    <div class="user-avatar" id="user-initials"></div>
    <span class="uname" id="user-display"></span>
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>
  <div id="loading-games" style="display:none;">Carregando jogos...</div>
  <div id="games-section" style="display:none;"></div>
  <div id="placares-section" style="display:none;">
    <div id="placares-content"></div>
  </div>
  <div id="ranking-section" style="display:none;">
    <div id="loading-ranking" style="display:none;">Calculando ranking...</div>
    <div id="ranking-content"></div>
  </div>
</main>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
<script>
const SUPABASE_URL = 'https://yciqdafnvcxrxgkwltxy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljaXFkYWZudmN4cnhna3dsdHh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExODI4MjIsImV4cCI6MjA5Njc1ODgyMn0.cZtvIIuPYMteHrqHjRlzLw9dU8bUeVr4LCOVvhVTxqw';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let todayGames = [];
let savedGuesses = {};
let rankingVisible = true;
let placaresVisible = true;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function isLocked(game) {
  return new Date() >= new Date(game.kickoff_utc);
}

function formatKickoffBRT(utcString) {
  return new Date(utcString).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', timeZone: 'America/Sao_Paulo' }) + ' (Brasília)';
}

function initDateLabel() {
  document.getElementById('date-label').textContent =
    new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', timeZone: 'America/Sao_Paulo' });
}

async function fetchTodayGames() {
  const now = new Date();
  const brt = new Date(now.toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
  const mo = String(brt.getMonth() + 1).padStart(2, '0');
  const dy = String(brt.getDate()).padStart(2, '0');
  const dateKey = mo + dy;
  const { data, error } = await sb.from('jogos').select('*').order('kickoff_utc', { ascending: true });
  if (error) { console.error(error); return []; }
  return (data || []).filter(g => g.id.endsWith(dateKey));
}

async function loadGuesses(nome) {
  savedGuesses = {};
  if (!todayGames.length) return;
  const ids = todayGames.map(g => g.id);
  const { data } = await sb.from('palpites').select('*').eq('nome', nome).in('game_id', ids);
  if (data) data.forEach(r => { savedGuesses[r.game_id] = r; });
}

function calcPoints(palpite, resultado) {
  if (!resultado) return null;
  const { home_score: ph, away_score: pa } = palpite;
  const { home_score: rh, away_score: ra } = resultado;
  if (ph === rh && pa === ra) return 3;
  const pRes = ph > pa ? 'H' : ph < pa ? 'A' : 'D';
  const rRes = rh > ra ? 'H' : rh < ra ? 'A' : 'D';
  return pRes === rRes ? 1 : 0;
}

async function fetchResultados() {
  try {
    const { data } = await sb.from('resultados').select('*');
    const map = {};
    if (data) data.forEach(r => { map[r.game_id] = r; });
    return map;
  } catch(e) { return {}; }
}

async function renderRanking() {
  const loadEl = document.getElementById('loading-ranking');
  const contentEl = document.getElementById('ranking-content');
  loadEl.style.display = 'block';
  contentEl.innerHTML = '';

  const { data: todos, error } = await sb.from('palpites').select('*');
  if (error || !todos || !todos.length) {
    loadEl.style.display = 'none';
    contentEl.innerHTML = '<div class="ranking-empty">Nenhum palpite registrado ainda.</div>';
    return;
  }

  const resultados = await fetchResultados();
  const OCULTOS = ['test'];
  const pontos = {}, acertos = {}, cravados = {};

  for (const p of todos) {
    if (OCULTOS.includes(p.nome.toLowerCase().trim())) continue;
    if (!pontos[p.nome]) { pontos[p.nome] = 0; acertos[p.nome] = 0; cravados[p.nome] = 0; }
    const pts = calcPoints(p, resultados[p.game_id]);
    if (pts !== null) {
      pontos[p.nome] += pts;
      if (pts >= 1) acertos[p.nome]++;
      if (pts === 3) cravados[p.nome]++;
    }
  }

  const ranking = Object.keys(pontos)
    .map(n => ({ nome: n, pts: pontos[n], acertos: acertos[n], cravados: cravados[n] }))
    .sort((a, b) => b.pts - a.pts || b.cravados - a.cravados || b.acertos - a.acertos);

  loadEl.style.display = 'none';
  const posIcons = ['🥇', '🥈', '🥉'];
  let html = `
    <div class="ranking-header">
      <span class="ranking-title">🏆 Ranking Kebolets</span>
      <span class="ranking-sub">Copa 2026</span>
    </div>
    <div class="ranking-card">
      <div class="ranking-legend">
        <div></div><div></div>
        <div class="rk-col"><span class="rk-col-label">Pts</span></div>
        <div class="rk-col"><span class="rk-col-label">✅</span></div>
        <div class="rk-col"><span class="rk-col-label">🎯</span></div>
      </div>`;

  ranking.forEach((r, i) => {
    const isMe = r.nome === currentUser;
    const rowClass = isMe ? 'ranking-row me' : i === 0 ? 'ranking-row top1' : 'ranking-row';
    html += `
      <div class="${rowClass}">
        <div class="pos">${posIcons[i] || (i + 1)}</div>
        <div class="rk-name${isMe ? ' me-label' : ''}">${r.nome}</div>
        <div class="rk-col"><span class="rk-pts">${r.pts}</span></div>
        <div class="rk-col" style="color:var(--gray-700);font-weight:600;">${r.acertos}</div>
        <div class="rk-col" style="color:var(--gray-700);font-weight:600;">${r.cravados}</div>
      </div>`;
  });

  html += `</div><div style="text-align:center;font-size:11px;color:var(--gray-400);margin-top:8px;">✅ resultados certos &nbsp;·&nbsp; 🎯 placares exatos</div>`;
  contentEl.innerHTML = html;
}

function renderGames() {
  const section = document.getElementById('games-section');
  const today = new Date().toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', timeZone: 'America/Sao_Paulo' });

  if (!todayGames.length) {
    section.innerHTML = `<div class="empty-day"><strong>Sem jogos hoje</strong>Não há partidas programadas para hoje. Volte amanhã!</div>`;
    section.style.display = 'block';
  } else {
    let html = `<div class="day-label">Jogos de hoje — ${today}</div>`;
    for (const g of todayGames) {
      const locked = isLocked(g);
      const saved = savedGuesses[g.id];
      const prevH = document.getElementById('h-' + g.id);
      const prevA = document.getElementById('a-' + g.id);
      const hVal = saved ? saved.home_score : (prevH ? prevH.value : '0');
      const aVal = saved ? saved.away_score : (prevA ? prevA.value : '0');
      const timeLabel = formatKickoffBRT(g.kickoff_utc);
      html += `
        <div class="match-card">
          <div class="match-meta">
            <span class="match-time">${timeLabel}</span>
            <span class="match-group">${g.grupo}</span>
          </div>
          <div class="match-body">
            <div class="team"><span class="team-flag">${g.home_flag}</span><span class="team-name">${g.home_name}</span></div>
            <div class="score-inputs">
              <input class="score-input" type="number" min="0" max="20" step="1" id="h-${g.id}" value="${hVal}" ${locked ? 'disabled' : ''} oninput="onEditPalpite('${g.id}')">
              <span class="score-sep">×</span>
              <input class="score-input" type="number" min="0" max="20" step="1" id="a-${g.id}" value="${aVal}" ${locked ? 'disabled' : ''} oninput="onEditPalpite('${g.id}')">
            </div>
            <div class="team"><span class="team-flag">${g.away_flag}</span><span class="team-name">${g.away_name}</span></div>
          </div>
          <div class="match-footer">
            ${locked
              ? `<span style="font-size:11px;color:var(--gold-dark);font-weight:600;">Encerrado</span>`
              : `<span class="saved-confirm" id="saved-${g.id}" style="font-size:11px;color:var(--green);font-weight:600;visibility:${saved ? 'visible' : 'hidden'};">✓ Palpite salvo</span>`
            }
          </div>
        </div>`;
    }
    section.innerHTML = html;
    section.style.display = 'block';
    // Aplica twemoji apenas nas bandeiras, não no texto do footer
    section.querySelectorAll('.team-flag').forEach(el => {
      twemoji.parse(el, { folder: 'svg', ext: '.svg' });
    });
  }

  const temAbertos = todayGames.some(g => !isLocked(g));
  if (temAbertos) section.innerHTML += `<button class="btn-save" id="btn-salvar-todos" style="width:100%;padding:12px;font-size:14px;border-radius:var(--radius-sm);margin-bottom:8px;opacity:0.4;cursor:not-allowed;" disabled onclick="salvarTodos()">Salvar</button>`;
  if (rankingVisible) document.getElementById('ranking-section').style.display = 'block';
  if (placaresVisible) { document.getElementById('placares-section').style.display = 'block'; renderPlacares(); }
}

function onEditPalpite(gameId) {
  const el = document.getElementById('saved-' + gameId);
  if (el) el.style.visibility = 'hidden';
  const btn = document.getElementById('btn-salvar-todos');
  if (btn) { btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer'; }
}

async function togglePlacares() {
  placaresVisible = !placaresVisible;
  const btn = document.getElementById('btn-placares');
  const ps = document.getElementById('placares-section');
  if (placaresVisible) {
    btn.textContent = '✕ Fechar placares';
    btn.classList.add('active');
    ps.style.display = 'block';
    renderPlacares();
  } else {
    btn.textContent = '📊 Ver placares do dia';
    btn.classList.remove('active');
    ps.style.display = 'none';
  }
}

async function renderPlacares() {
  const resultados = await fetchResultados();
  const contentEl = document.getElementById('placares-content');
  if (!todayGames.length) { contentEl.innerHTML = ''; return; }

  let html = `
    <div class="ranking-header" style="margin-top:1.25rem;">
      <span class="ranking-title">📊 Placares do dia</span>
      <button onclick="togglePlacares()" style="font-size:12px;color:var(--gray-400);background:none;border:none;cursor:pointer;font-family:'Barlow',sans-serif;font-weight:600;">✕ Fechar</button>
    </div>
    <div class="placares-card">`;

  for (const g of todayGames) {
    const res = resultados[g.id];
    const locked = isLocked(g);
    let scoreHtml = '';
    if (res) {
      scoreHtml = `<div class="placar-score">${res.home_score} <span style="color:var(--gray-400);font-size:14px;">×</span> ${res.away_score}</div>`;
    } else if (locked) {
      scoreHtml = `<div class="placar-score pending">em andamento</div>`;
    } else {
      scoreHtml = `<div class="placar-score pending">${formatKickoffBRT(g.kickoff_utc)}</div>`;
    }

    html += `
      <div class="placar-row">
        <div class="placar-team">
          <span class="placar-flag">${g.home_flag}</span>
          ${g.home_name}
        </div>
        ${scoreHtml}
        <div class="placar-team away">
          <span class="placar-flag">${g.away_flag}</span>
          ${g.away_name}
        </div>
      </div>`;
  }

  html += `</div>`;
  contentEl.innerHTML = html;
  contentEl.querySelectorAll('.placar-flag').forEach(el => {
    twemoji.parse(el, { folder: 'svg', ext: '.svg' });
  });
}

async function enterWithName() {
  const input = document.getElementById('name-input');
  const nome = input.value.trim();
  if (!nome) { showToast('Digite seu nome para continuar.'); return; }
  currentUser = nome;
  localStorage.setItem('bolao_kebolets_nome', nome);
  document.getElementById('name-section').style.display = 'none';
  document.getElementById('loading-games').style.display = 'block';
  try {
    todayGames = await fetchTodayGames();
    await loadGuesses(nome);
  } catch(e) { console.error(e); todayGames = []; }
  const initials = nome.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
  document.getElementById('user-initials').textContent = initials;
  document.getElementById('user-display').textContent = nome;
  document.getElementById('user-bar').style.display = 'flex';
  document.getElementById('loading-games').style.display = 'none';
  renderGames();
  document.getElementById('ranking-section').style.display = 'block';
  document.getElementById('placares-section').style.display = 'block';
  await renderRanking();
  await renderPlacares();
}

async function salvarTodos() {
  const btn = document.getElementById('btn-salvar-todos');
  if (btn) { btn.disabled = true; btn.textContent = 'Salvando...'; }
  const jogosAbertos = todayGames.filter(g => !isLocked(g));
  if (!jogosAbertos.length) { showToast('Nenhum jogo aberto.'); if (btn) { btn.disabled = false; btn.textContent = 'Salvar'; } return; }
  let salvos = 0;
  for (const g of jogosAbertos) {
    const hi = parseInt(document.getElementById('h-' + g.id)?.value);
    const ai = parseInt(document.getElementById('a-' + g.id)?.value);
    if (isNaN(hi) || isNaN(ai) || hi < 0 || ai < 0) continue;
    const { error } = await sb.from('palpites').upsert(
      { nome: currentUser, game_id: g.id, home_score: hi, away_score: ai },
      { onConflict: 'nome,game_id' }
    );
    if (!error) {
      salvos++;
      const el = document.getElementById('saved-' + g.id);
      if (el) el.style.visibility = 'visible';
    }
  }
  await loadGuesses(currentUser);
  if (btn) { btn.disabled = false; btn.textContent = 'Salvar'; }
  showToast(salvos === jogosAbertos.length ? 'Todos os palpites salvos! 🎯' : `${salvos} palpite(s) salvo(s).`);
}

function sair() {
  currentUser = null;
  rankingVisible = true;
  placaresVisible = true;
  localStorage.removeItem('bolao_kebolets_nome');
  savedGuesses = {};
  todayGames = [];
  document.getElementById('user-bar').style.display = 'none';
  document.getElementById('games-section').style.display = 'none';
  document.getElementById('games-section').innerHTML = '';
  document.getElementById('ranking-section').style.display = 'none';
  document.getElementById('placares-section').style.display = 'none';
  document.getElementById('name-section').style.display = 'block';
  document.getElementById('name-input').value = '';
}

window.addEventListener('load', async () => {
  initDateLabel();
  const nomeSalvo = localStorage.getItem('bolao_kebolets_nome');
  if (nomeSalvo) {
    document.getElementById('name-input').value = nomeSalvo;
    await enterWithName();
  }
});
</script>
