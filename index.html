function todayRangeBRT() {
  const now = new Date();
  const brtOffset = -3 * 60;
  const localOffset = now.getTimezoneOffset();
  const diff = (localOffset + brtOffset) * 60 * 1000;
  const brtNow = new Date(now.getTime() + diff);
  const y = brtNow.getUTCFullYear();
  const m = String(brtNow.getUTCMonth() + 1).padStart(2, '0');
  const d = String(brtNow.getUTCDate()).padStart(2, '0');
  const start = `${y}-${m}-${d}T03:00:00Z`;
  const nextDay = new Date(`${y}-${m}-${d}T03:00:00Z`);
  nextDay.setUTCDate(nextDay.getUTCDate() + 1);
  return { start, end: nextDay.toISOString() };
}

async function fetchTodayGames() {
  // Data de hoje em BRT como string MMDD para comparar com o ID dos jogos
  const now = new Date();
  const brt = new Date(now.toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
  const y = brt.getFullYear();
  const m = String(brt.getMonth() + 1).padStart(2, '0');
  const d = String(brt.getDate()).padStart(2, '0');
  const dateKey = `${y}${m}${d}`; // ex: 20260611

  // Busca todos os jogos cujo ID termina com a data de hoje
  const { data, error } = await sb.from('jogos').select('*')
    .ilike('id', `%-${dateKey}`)
    .order('kickoff_utc', { ascending: true });
  if (error) { console.error(error); return []; }
  if (data && data.length) return data;

  // Fases eliminatórias: busca via Edge Function
  const dateStr = `${y}-${m}-${d}`;
  try {
    const resp = await fetch(`${PROXY}?endpoint=matches&date=${dateStr}`, {
      headers: { 'apikey': SUPABASE_KEY }
    });
    if (!resp.ok) return [];
    const json = await resp.json();
    return (json.matches || []).map(m => {
      const tla_h = m.homeTeam.tla || '';
      const tla_a = m.awayTeam.tla || '';
      const ds = m.utcDate.slice(0, 10).replace(/-/g, '');
      return {
        id: `${tla_h.toLowerCase()}-${tla_a.toLowerCase()}-${ds}`,
        grupo: GRUPOS[tla_h] || m.stage || 'Copa 2026',
        home_name: m.homeTeam.shortName || m.homeTeam.name,
        home_flag: FLAGS[tla_h] || '🏳️',
        away_name: m.awayTeam.shortName || m.awayTeam.name,
        away_flag: FLAGS[tla_a] || '🏳️',
        kickoff_utc: m.utcDate,
      };
    });
  } catch(e) {
    console.error('Erro ao buscar jogos via API:', e);
    return [];
  }
}

async function loadGuesses(nome) {
  savedGuesses = {};
  if (!todayGames.length) return;
  const ids = todayGames.map(g => g.id);
  const { data } = await sb.from('palpites').select('*').eq('nome', nome).in('game_id', ids);
  if (data) data.forEach(r => { savedGuesses[r.game_id] = r; });
}

function calcPoints(palpite, resultado) {
  if (!resultado) return null; // jogo sem resultado ainda
  const { home_score: ph, away_score: pa } = palpite;
  const { home_score: rh, away_score: ra } = resultado;
  if (ph === rh && pa === ra) return 3;
  const pRes = ph > pa ? 'H' : ph < pa ? 'A' : 'D';
  const rRes = rh > ra ? 'H' : rh < ra ? 'A' : 'D';
  if (pRes === rRes) return 1;
  return 0;
}

async function fetchResultados() {
  try {
    const resp = await fetch(`${PROXY}?endpoint=matches&status=FINISHED`, {
      headers: { 'apikey': SUPABASE_KEY }
    });
    if (!resp.ok) return {};
    const json = await resp.json();
    const map = {};
    for (const m of (json.matches || [])) {
      const dateStr = m.utcDate.slice(0, 10).replace(/-/g, '');
      const home = m.homeTeam.tla?.toLowerCase() || '';
      const away = m.awayTeam.tla?.toLowerCase() || '';
      map[`${home}-${away}-${dateStr}`] = {
        home_score: m.score.fullTime.home,
        away_score: m.score.fullTime.away
      };
    }
    return map;
  } catch(e) {
    console.error('Erro ao buscar resultados:', e);
    return {};
  }
}

  let html = `
    <div class="ranking-header">
      <span class="ranking-title">🏆 Ranking Kebolets</span>
      <span class="ranking-sub">Copa 2026</span>
    </div>
    <div class="ranking-card">
      <div class="ranking-legend">
        <div></div>
        <div></div>
        <div class="rk-col"><span class="rk-col-label">Pts</span></div>
        <div class="rk-col"><span class="rk-col-label">✅</span></div>
        <div class="rk-col"><span class="rk-col-label">🎯</span></div>
      </div>`;

  ranking.forEach((r, i) => {
    const isMe = r.nome === currentUser;
    const posClass = i === 0 ? 'pos gold' : i === 1 ? 'pos silver' : i === 2 ? 'pos bronze' : 'pos';
    const rowClass = isMe ? 'ranking-row me' : i === 0 ? 'ranking-row top1' : 'ranking-row';
    const icon = posIcons[i] || `${i + 1}`;
    html += `
      <div class="${rowClass}">
        <div class="${posClass}">${icon}</div>
        <div class="rk-name${isMe ? ' me-label' : ''}">${r.nome}</div>
        <div class="rk-col"><span class="rk-pts">${r.pts}</span></div>
        <div class="rk-col" style="color:var(--gray-700);font-weight:600;">${r.acertos}</div>
        <div class="rk-col" style="color:var(--gray-700);font-weight:600;">${r.cravados}</div>
      </div>`;
  });

  html += `</div>
    <div style="text-align:center;font-size:11px;color:var(--gray-400);margin-top:8px;">
      ✅ resultados certos &nbsp;·&nbsp; 🎯 placares exatos
    </div>`;

  contentEl.innerHTML = html;
}

function renderGames() {
  const section = document.getElementById('games-section');
  const today = new Date().toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', timeZone: 'America/Sao_Paulo' });

  if (!todayGames.length) {
    section.innerHTML = `<div class="empty-day"><strong>Sem jogos hoje</strong>Não há partidas programadas para hoje. Volte amanhã!</div>`;
    section.style.display = 'block';
  } else {
    let html = `<div class="day-label">Jogos de hoje — ${today}</div>`;
    for (const g of todayGames) {
      const locked = isLocked(g);
      const saved = savedGuesses[g.id];
      const prevH = document.getElementById('h-' + g.id);
      const prevA = document.getElementById('a-' + g.id);
      const hVal = saved ? saved.home_score : (prevH ? prevH.value : '0');
      const aVal = saved ? saved.away_score : (prevA ? prevA.value : '0');
      const timeLabel = formatKickoffBRT(g.kickoff_utc);
      html += `
        <div class="match-card">
          <div class="match-meta">
            <span class="match-time">${timeLabel}</span>
            <span class="match-group">${g.grupo}</span>
          </div>
          <div class="match-body">
            <div class="team"><span class="team-flag">${g.home_flag}</span><span class="team-name">${g.home_name}</span></div>
            <div class="score-inputs">
              <input class="score-input" type="number" min="0" max="20" step="1" id="h-${g.id}" value="${hVal}" ${locked ? 'disabled' : ''} oninput="onEditPalpite('${g.id}')">
              <span class="score-sep">×</span>
              <input class="score-input" type="number" min="0" max="20" step="1" id="a-${g.id}" value="${aVal}" ${locked ? 'disabled' : ''} oninput="onEditPalpite('${g.id}')">
            </div>
            <div class="team"><span class="team-flag">${g.away_flag}</span><span class="team-name">${g.away_name}</span></div>
          </div>
          ${locked
            ? `<div class="match-footer"><span class="badge badge-locked">🔒 Encerrado</span><div></div></div>`
            : `<div class="match-footer" style="justify-content:flex-end;">
                <span class="saved-confirm" id="saved-${g.id}" style="font-size:11px;color:var(--green);font-weight:600;visibility:${saved ? 'visible' : 'hidden'};">✓ Palpite salvo</span>
              </div>`
          }
        </div>`;
    }
    section.innerHTML = html;
    section.style.display = 'block';
    twemoji.parse(section, { folder: 'svg', ext: '.svg' });
  }

  // Botão salvar todos + ranking
  const temAbertos = todayGames.some(g => !isLocked(g));
  section.innerHTML += temAbertos
    ? `<button class="btn-save" id="btn-salvar-todos" style="width:100%;padding:12px;font-size:14px;border-radius:var(--radius-sm);margin-bottom:8px;" onclick="salvarTodos()">Salvar</button>`
    : '';
  section.innerHTML += `<button class="btn-ranking" id="btn-ranking" onclick="toggleRanking()">🏆 Ver ranking</button>`;
}

async function toggleRanking() {
  rankingVisible = !rankingVisible;
  const btn = document.getElementById('btn-ranking');
  const rs = document.getElementById('ranking-section');
  if (rankingVisible) {
    btn.textContent = '✕ Fechar ranking';
    btn.classList.add('active');
    rs.style.display = 'block';
    await renderRanking();
  } else {
    btn.textContent = '🏆 Ver ranking';
    btn.classList.remove('active');
    rs.style.display = 'none';
  }
}

async function enterWithName() {
  const input = document.getElementById('name-input');
  const nome = input.value.trim();
  if (!nome) { showToast('Digite seu nome para continuar.'); return; }
  currentUser = nome;
  localStorage.setItem('bolao_kebolets_nome', nome);
  document.getElementById('name-section').style.display = 'none';
  document.getElementById('loading-games').style.display = 'block';
  todayGames = await fetchTodayGames();
  await loadGuesses(nome);
  const initials = nome.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
  document.getElementById('user-initials').textContent = initials;
  document.getElementById('user-display').textContent = nome;
  document.getElementById('user-bar').style.display = 'flex';
  document.getElementById('loading-games').style.display = 'none';
  renderGames();
}

async function salvarTodos() {
  const btn = document.getElementById('btn-salvar-todos');
  if (btn) { btn.disabled = true; btn.textContent = 'Salvando...'; }
  const jogosAbertos = todayGames.filter(g => !isLocked(g));
  if (!jogosAbertos.length) { showToast('Nenhum jogo aberto para salvar.'); if (btn) { btn.disabled = false; btn.textContent = 'Salvar'; } return; }
  let salvos = 0;
  for (const g of jogosAbertos) {
    const h = document.getElementById('h-' + g.id)?.value;
    const a = document.getElementById('a-' + g.id)?.value;
    const hi = parseInt(h), ai = parseInt(a);
    if (isNaN(hi) || isNaN(ai) || hi < 0 || ai < 0) continue;
    const { error } = await sb.from('palpites').upsert(
      { nome: currentUser, game_id: g.id, home_score: hi, away_score: ai },
      { onConflict: 'nome,game_id' }
    );
    if (!error) {
      salvos++;
      const confirmEl = document.getElementById('saved-' + g.id);
      if (confirmEl) confirmEl.style.visibility = 'visible';
    }
  }
  await loadGuesses(currentUser);
  if (btn) { btn.disabled = false; btn.textContent = 'Salvar'; }
  showToast(salvos === jogosAbertos.length ? 'Todos os palpites salvos! 🎯' : `${salvos} palpite(s) salvo(s).`);
}
}

function onEditPalpite(gameId) {
  const el = document.getElementById('saved-' + gameId);
  if (el) el.style.visibility = 'hidden';
}

async function salvarPalpite(gameId) {
  const game = todayGames.find(g => g.id === gameId);
  if (isLocked(game)) { showToast('Partida já iniciou. Palpite encerrado.'); renderGames(); return; }
  const h = document.getElementById('h-' + gameId).value;
  const a = document.getElementById('a-' + gameId).value;
  const hi = parseInt(h), ai = parseInt(a);
  if (isNaN(hi) || isNaN(ai) || hi < 0 || ai < 0) { showToast('Placar inválido.'); return; }
  const btn = document.querySelector(`[onclick="salvarPalpite('${gameId}')"]`);
  if (btn) { btn.disabled = true; btn.textContent = 'Salvando...'; }
  const { error } = await sb.from('palpites').upsert(
    { nome: currentUser, game_id: gameId, home_score: hi, away_score: ai },
    { onConflict: 'nome,game_id' }
  );
  if (error) {
    if (error.code === '23505') showToast('Você já enviou um palpite para esse jogo.');
    else { showToast('Erro ao salvar. Tente novamente.'); }
    if (btn) { btn.disabled = false; btn.textContent = 'Salvar'; }
    return;
  }
  await loadGuesses(currentUser);
  if (btn) { btn.disabled = false; btn.textContent = 'Salvar'; }
  const confirmEl = document.getElementById('saved-' + gameId);
  if (confirmEl) confirmEl.style.visibility = 'visible';
}

function sair() {
  currentUser = null;
  rankingVisible = false;
  localStorage.removeItem('bolao_kebolets_nome');
  savedGuesses = {};
  todayGames = [];
  document.getElementById('user-bar').style.display = 'none';
  document.getElementById('games-section').style.display = 'none';
  document.getElementById('games-section').innerHTML = '';
  document.getElementById('ranking-section').style.display = 'none';
  document.getElementById('name-section').style.display = 'block';
  document.getElementById('name-input').value = '';
}

window.addEventListener('load', async () => {
  initDateLabel();
  const nomeSalvo = localStorage.getItem('bolao_kebolets_nome');
  if (nomeSalvo) {
    document.getElementById('name-input').value = nomeSalvo;
    await enterWithName();
  }
});
</script>
</body>
</html>
